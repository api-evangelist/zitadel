specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Zitadel
providerId: zitadel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Authentication
  - Authorization
  - Identity Management
  - Open Source
  - OAuth 2.0
  - OIDC
description: |
  ZITADEL Cloud is sold as three plans (Free / Pro / Enterprise) anchored on Daily
  Active Users (DAU). Self-hosting is also free under the open-source licence; ZITADEL
  Enterprise covers cloud-managed and bring-your-own-infrastructure deployments with
  custom volume pricing. Pro adds optional add-ons for extended SLA support and data
  location.
sources:
  - https://zitadel.com/pricing
plans:
  - id: zitadel-free
    name: Free
    type: freemium
    description: Free ZITADEL Cloud tier with all security features, unlimited users
      and organizations, capped at 100 DAU.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0/month'
        userMultiplied: false
      - label: Daily Active Users
        name: dau
        type: quota
        metric: dau
        limit: 100
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Identity Providers
        name: identity_providers
        type: quota
        metric: provider
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: All security features
      - name: Unlimited users
      - name: Unlimited organizations
      - name: Community support
  - id: zitadel-pro
    name: Pro
    type: subscription
    description: Production tier — 25,000 DAU, custom domain, 99.5% uptime, extended
      support and SLA.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$100/month'
        userMultiplied: false
      - label: Daily Active Users
        name: dau
        type: quota
        metric: dau
        limit: 25000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Identity Providers
        name: identity_providers
        type: quota
        metric: provider
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Extended Support and SLA add-on
        name: addon_extended_support_sla
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$999/month (99.95% availability)'
        userMultiplied: false
      - label: Data Location add-on
        name: addon_data_location
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$100/month'
        userMultiplied: false
    elements:
      - name: Custom domain
      - name: 99.5% uptime guarantee
      - name: Extended support and SLA
      - name: Optional data-location pinning (US, EU, Switzerland, Australia)
  - id: zitadel-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced tier for cloud or self-hosted deployments — volume-based
      pricing, custom SLA, custom threat analysis, named TAM.
    entries:
      - label: Subscription
        name: subscription
        type: enterprise
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Cloud or self-hosted
      - name: Customized support SLA
      - name: Volume-based pricing
      - name: Custom metrics configuration
      - name: Custom threat analysis
      - name: Technical Account Manager
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Zitadel
providerId: zitadel
publisherName: ZITADEL (CAOS AG)
serviceCategory: Identity / Authentication
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Authentication
  - Authorization
  - Identity Management
  - FinOps
  - FOCUS
description: |
  FOCUS-aligned FinOps view for ZITADEL Cloud: a tiered subscription anchored on
  Daily Active Users (DAU), with optional Pro add-ons for extended SLA support and
  data-location pinning, and custom volume-based pricing at Enterprise. Self-hosting
  the open-source build has no ZITADEL invoice line.
sources:
  - https://zitadel.com/pricing
  - https://zitadel.com/docs/legal/policies/rate-limit-policy
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: ZITADEL Cloud
  ServiceCategory: Identity / Authentication
  ProviderName: ZITADEL
  PublisherName: ZITADEL (CAOS AG)
  InvoiceIssuerName: ZITADEL (CAOS AG)
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: plan_subscription
    description: Monthly plan subscription (Free / Pro / Enterprise); the primary ZITADEL
      Cloud billing line.
    unit: month
    aggregation: max
    dimensions:
      - plan_tier
  - name: daily_active_users
    description: DAU consumed against the plan's bundled cap (100 Free / 25,000 Pro /
      custom Enterprise).
    unit: dau
    aggregation: max
    dimensions:
      - plan_tier
  - name: addon_extended_support_sla
    description: Optional Pro add-on for 99.95% availability and extended support /
      SLA at $999/month.
    unit: month
    aggregation: max
  - name: addon_data_location
    description: Optional Pro add-on for region pinning (US / EU / Switzerland /
      Australia) at $100/month.
    unit: month
    aggregation: max
    dimensions:
      - region
principles:
  - name: Visibility
    description: Use the ZITADEL Cloud customer console for current DAU and plan
      consumption; self-hosted deployments have no ZITADEL invoice but cost shows up
      as the underlying compute / DB / storage.
  - name: Allocation
    description: Allocate ZITADEL spend per environment (dev / staging / prod) and per
      tenant organization; tag region pinning to the regulated business unit that
      requires it.
  - name: Optimization
    description: Cost levers are choosing Free vs Pro based on actual DAU, whether the
      Extended Support and SLA add-on is required by SLAs, and whether self-hosting
      the open-source build is preferable to ZITADEL Cloud at the customer's scale.
  - name: Accountability
    description: Spend ownership sits with the platform / identity team that owns the
      ZITADEL deployment; review at the monthly DAU report and at Enterprise contract
      renewal.
maintainers:

  - aid: zitadel:auth-api
    name: Zitadel Auth API
    description: >-
      The Zitadel Auth API provides endpoints for authenticated users to perform operations on their own accounts,
      including profile management, session handling, MFA setup, and personal data management. Accessible at /auth/v1/.
    humanURL: https://zitadel.com/docs/apis/introduction
    tags:
      - Authentication
      - User Profile
      - Session Management
      - MFA
    properties:
      - type: Documentation
        url: https://zitadel.com/docs/apis/introduction
  - aid: zitadel:admin-api
    name: Zitadel Admin API
    description: >-
      The Zitadel Admin API provides instance-level configuration for Zitadel administrators. Used to configure
      instance-wide settings, default policies, SMTP, SMS providers, and manage identity providers at the system level.
      Accessible at /admin/v1/.
    humanURL: https://zitadel.com/docs/apis/introduction
    tags:
      - Administration
      - Identity Management
      - Configuration
    properties:
      - type: Documentation
        url: https://zitadel.com/docs/apis/introduction
  - aid: zitadel:oidc-oauth
    name: Zitadel OIDC / OAuth 2.0
    description: >-
      Zitadel implements the OpenID Connect and OAuth 2.0 standards for authentication and authorization flows. Provides
      authorization code flow, client credentials, device code, token introspection, and userinfo endpoints. Available
      at /oauth/v2/ and /oidc/v1/.
    humanURL: https://zitadel.com/docs/guides/integrate/login/oidc
    tags:
      - OAuth 2.0
      - OpenID Connect
      - Authentication
      - Authorization
    properties:
      - type: Documentation
        url: https://zitadel.com/docs/guides/integrate/login/oidc
  - aid: zitadel:saml-api
    name: Zitadel SAML API
    description: >-
      Zitadel provides SAML 2.0 single sign-on support, enabling enterprises to integrate with Zitadel using SAML
      identity federation. Accessible at /saml/v2/.
    humanURL: https://zitadel.com/docs/guides/integrate/login/saml
    tags:
      - SAML
      - Single Sign-On
      - Authentication
    properties:
      - type: Documentation
        url: https://zitadel.com/docs/guides/integrate/login/saml

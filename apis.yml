apis:
  - aid: zitadel:management-api
    name: Zitadel Management API
    description: >-
      The Zitadel Management API provides administrative operations for managing users, organizations, projects,
      applications, roles, policies, and identity providers within a Zitadel instance. Accessible via REST at
      /management/v1/ and via gRPC. Supports comprehensive CRUD operations for all identity management resources.
    humanURL: https://zitadel.com/docs/reference/api/management
    tags:
      - Identity Management
      - Authentication
      - User Management
      - Organizations

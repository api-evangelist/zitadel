aid: zitadel
name: Zitadel
description: >-
  Zitadel is an open source identity infrastructure platform providing secure authentication and user management with
  built-in support for OAuth 2.0, OpenID Connect, SAML 2.0, SCIM, FIDO2, and passkeys. It offers multi-tenancy,
  fine-grained authorization, and a comprehensive management API for building and operating identity-first applications.
  Available as cloud-hosted and self-hosted deployments.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Authentication
  - Authorization
  - Identity Management
  - Open Source
  - OAuth 2.0
  - OIDC

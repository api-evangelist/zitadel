specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Zitadel
providerId: zitadel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Authentication
  - Authorization
  - Identity Management
  - Rate Limiting
description: |
  ZITADEL Cloud applies IP-oriented rate limits, with separate ceilings for the
  login / register / reset UI paths and for all other gRPC / REST / OAuth API
  endpoints. DDoS mitigation is layered on top, so simply rotating IPs to evade
  limits can lead to blocking. Self-hosted ZITADEL has no enforced ceiling.
sources:
  - https://zitadel.com/docs/legal/policies/rate-limit-policy
responseCodes:
  throttled: 429
limits:
  - name: UI paths (/ui/* — Login, Register, Reset)
    scope: IP
    metric: requests_per_second
    limit: 10
    timeFrame: second
    notes: Steady-state limit; bursts up to 15 req/s tolerated (3-minute burst window).
  - name: gRPC / REST / OAuth APIs (all other paths)
    scope: IP
    metric: requests_per_second
    limit: 50
    timeFrame: second
    notes: Steady-state and burst both 50 req/s.
policies:
  - name: IP-oriented limiting
    description: Rate limits are bound to the source IP address; ZITADEL Cloud sits
      behind DDoS mitigation that may block IPs that try to evade limits by rotating.
  - name: 429 + exponential backoff
    description: When throttled the API returns HTTP 429; clients should implement
      exponential backoff with jitter rather than tight retry loops.
  - name: Shared-IP accommodation
    description: Customers behind corporate proxies / NAT can request limit adjustments
      via support@zitadel.com.
  - name: Load testing requires advance notice
    description: Load testing requires at least two weeks advance notice via
      support@zitadel.com; unauthorized load testing risks DDoS flagging and service
      termination.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
